worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50m;

    # HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS — Flutter web + Node API + PostgREST
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        root /usr/share/nginx/html;
        index index.html;

        # Static files — never fall back to index.html (fixes broken images/fonts).
        location ~* ^/(assets|images|icons|canvaskit|fonts)/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|js|css|json|bin|wasm|map)$ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ^~ stops regex static rules (e.g. *.png) from stealing /api/files/… uploads.
        location ^~ /api/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50m;
        }

        location ^~ /auth/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /health {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Flutter PostgREST client: {POSTGREST_URL}/rest/v1/...
        location ^~ /rest/v1/ {
            proxy_pass http://postgrest:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
