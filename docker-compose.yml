# Project Tracker — on-prem stack (Ubuntu)
#
# Local dev (Postgres + backend + PostgREST on localhost):
#   cp .env.example .env
#   docker compose up -d postgres postgrest rest-gateway backend
#
# HKU server deploy:
#   ./scripts/deploy_web.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: pt-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-project_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind to localhost only — use for psql / migration tools from the Ubuntu host
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-project_tracker} -d ${POSTGRES_DB:-project_tracker}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pt-test-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      SSO_ISSUER_URL: ${SSO_ISSUER_URL:-}
      SSO_SCOPES: ${SSO_SCOPES:-openid hku}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-}
      SSO_REDIRECT_URI: ${SSO_REDIRECT_URI:-}
      SSO_POST_LOGOUT_REDIRECT_URI: ${SSO_POST_LOGOUT_REDIRECT_URI:-}
      DISABLE_INTERNAL_URGENT_CRON: "true"
      EMAIL_SENDING_ENABLED: "${EMAIL_SENDING_ENABLED:-false}"
      DATABASE_URL: postgres://${POSTGRES_USER:-project_tracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-project_tracker}
      UPLOAD_DIR: /data/uploads
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
    volumes:
      - ./data/uploads:/data/uploads
    ports:
      # Bind to localhost; nginx (host or container) proxies public traffic
      - "127.0.0.1:3000:3000"

  # Step 4: PostgREST — local Supabase-compatible REST API over Postgres
  postgrest:
    image: postgrest/postgrest:v12.2.8
    container_name: pt-test-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGREST_AUTHENTICATOR_PASSWORD:-postgrest-authenticator-dev-change-me}@postgres:5432/${POSTGRES_DB:-project_tracker}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_AUTHENTICATOR_ROLE: authenticator
      # JWT auth disabled for on-prem (Flutter calls REST without Authorization).
      # To enable later: add PGRST_JWT_SECRET to this service environment.
      PGRST_SERVER_PORT: 3000
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:${POSTGREST_PORT:-3001}
    expose:
      - "3000"

  # Maps /rest/v1/* → PostgREST (Flutter supabase client expects this path)
  rest-gateway:
    image: nginx:1.27-alpine
    container_name: pt-test-rest-gateway
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "127.0.0.1:${POSTGREST_PORT:-3001}:80"
    volumes:
      - ./docker/nginx/postgrest-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  # Public HTTPS gateway for HKU test server (projecttrackertest.hku.hk).
  # Requires: build/web, docker/nginx/ssl/{nginx.crt,nginx.key}
  frontend:
    image: nginx:1.27-alpine
    container_name: pt-frontend
    restart: unless-stopped
    profiles:
      - production
    depends_on:
      - backend
      - postgrest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./build/web:/usr/share/nginx/html:ro
      - ./docker/nginx/production.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro

  # Optional: local HTTP-only nginx (no TLS) for smoke tests on the host.
  nginx:
    image: nginx:1.27-alpine
    container_name: pt-test-nginx
    restart: unless-stopped
    profiles:
      - with-nginx
    depends_on:
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./build/web:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  upload_data:

# --- Database migrations (run once from Ubuntu host, after postgres is up) ---
