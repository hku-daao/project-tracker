<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="project_tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=20260330">

  <!-- Favicon: bump ?v= when replacing favicon.png (Firefox caches tab icons very aggressively). -->
  <link rel="icon" type="image/png" sizes="96x96" href="favicon.png?v=20260330">
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=20260330">

  <title>Project Tracker</title>
  <link rel="manifest" href="manifest.json">

  <!-- Do NOT load firebase-*-compat.js here. FlutterFire (firebase_core_web) injects the
       modular Firebase JS SDK (v11.x) for app, auth, storage, etc. Mixing compat 10.x scripts
       with that breaks Storage interop (uncaught errors in guardWebExceptions / ref()). -->
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #2A2B2C;
    }

    #loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #2A2B2C;
      color: #FFFFFF;
    }

    .startup-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .startup-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .startup-brand img {
      height: 48px;
      width: auto;
      display: block;
    }

    .startup-brand-text {
      font-size: 18px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .startup-label {
      margin-top: 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .startup-bar {
      margin-top: 12px;
      width: 220px;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.4);
    }

    .startup-bar::before {
      content: "";
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: #FFFFFF;
      animation: startup-indeterminate 1.15s ease-in-out infinite;
    }

    @keyframes startup-indeterminate {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(260%);
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="startup-loader">
      <div class="startup-brand" aria-label="Project Tracker">
        <img src="assets/assets/images/logo.png" alt="Project Tracker logo">
        <div class="startup-brand-text">Project<br>Tracker</div>
      </div>
      <div class="startup-label">Loading</div>
      <div class="startup-bar" aria-hidden="true"></div>
    </div>
  </div>
  <!-- Drop stale Flutter service workers so normal browsers load the latest deploy. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js"></script>
</body>
</html>
